---
- name: Run database container
  community.docker.docker_container:
    name: database
    image: neymarjr92/tp-devops-database:latest
    pull: true
    state: started
    restart_policy: always
    networks:
      - name: app-network
    env:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
